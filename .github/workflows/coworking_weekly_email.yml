name: Coworking Weekly Requirements Email

on:
  schedule:
    # 9am PT every Tuesday (17:00 UTC)
    - cron: '0 17 * * 2'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print emails without sending'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  send-weekly-email:
    name: Send coworking requirements to operators
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary python-dotenv

      - name: Send weekly requirements email
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python Coworking/coworking_weekly_email.py --dry-run
          else
            python Coworking/coworking_weekly_email.py
          fi
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}

      - name: Notify on failure
        if: failure()
        run: echo "Coworking weekly email failed. Check logs above."
